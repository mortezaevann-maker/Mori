<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mori Hairstyle</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #2c1a0a 0%, #101010 60%, #000000 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
            padding: 40px 25px;
            background: rgba(16, 16, 16, 0.6);
            border-radius: 24px;
            border: 1px solid rgba(255, 102, 0, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        /* Profile Section */
        .profile-section {
            margin-bottom: 35px;
            position: relative;
        }

        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 18px;
        }

        .logo {
            width: 115px;
            height: 115px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ff6600;
            box-shadow: 0 0 20px rgba(255, 102, 0, 0.4);
            position: relative;
            z-index: 2;
        }

        .logo-container::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 130px;
            height: 130px;
            background: rgba(255, 102, 0, 0.15);
            border-radius: 50%;
            filter: blur(15px);
            z-index: 1;
        }

        .title {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: #ffffff;
            margin-bottom: 6px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 13px;
            color: #b0b0b0;
            font-weight: 400;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Links Container */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(145deg, #1a1a1a 0%, #111111 100%);
            border: 1px solid rgba(255, 102, 0, 0.15);
            padding: 18px 22px;
            border-radius: 14px;
            text-decoration: none;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transition: 0.5s;
        }

        .link-card:hover::before {
            left: 100%;
        }

        .link-card i {
            font-size: 22px;
            width: 35px;
            text-align: left;
            color: #ff6600;
            transition: transform 0.3s ease;
        }

        .link-card span {
            flex-grow: 1;
            margin-left: 15px;
            text-align: left;
        }

        .link-card .arrow {
            font-size: 14px;
            opacity: 0.5;
            color: #ffffff;
            transform: translateX(0);
            transition: all 0.3s ease;
        }

        /* Hover Effects */
        .link-card:hover {
            transform: translateY(-3px);
            background: #ff6600;
            border-color: #ff8533;
            box-shadow: 0 8px 25px rgba(255, 102, 0, 0.5);
        }

        .link-card:hover i,
        .link-card:hover span {
            color: #000000;
        }

        .link-card:hover .arrow {
            color: #000000;
            opacity: 1;
            transform: translateX(5px);
        }

        /* Footer */
        .footer {
            margin-top: 45px;
            font-size: 11px;
            color: #444444;
            letter-spacing: 1px;
        }
        
        .footer strong {
            color: #666666;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="profile-section">
            <div class="logo-container">
                <img src="IMG_9267.png" alt="Mori Hairstyle" class="logo">
            </div>
            <h1 class="title">Mori Hairstyle</h1>
            <p class="subtitle">Professional Hair Grooming</p>
        </div>

        <div class="links-container">
            
            <a href="https://www.instagram.com/mori__hairstyle?igsh=eTM0c2lianZxd2sz&utm_source=qr" target="_blank" class="link-card instagram">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <a href="https://api.whatsapp.com/send?phone=96897863928" target="_blank" class="link-card whatsapp">
                <i class="fab fa-whatsapp"></i>
                <span>WhatsApp</span>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

            <a href="https://maps.app.goo.gl/X6feKLVvSwkMEmYd9?g_st=ic" target="_blank" class="link-card location">
                <i class="fas fa-map-marker-alt"></i>
                <span>Our Location</span>
                <i class="fas fa-chevron-right arrow"></i>
            </a>

        </div>

        <div class="footer">
            <p>© 2026 <strong>Mori Hairstyle</strong>. All Rights Reserved.</p>
        </div>

    </div>

</body>
</html>
